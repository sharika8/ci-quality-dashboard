name: Build & Deploy Dashboard
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare index.html
        run: |
          mkdir -p dist
          if [ -f src/dashboard.html ]; then
            cp src/dashboard.html dist/index.html
          elif [ -f index.html ]; then
            cp index.html dist/index.html
          fi
          echo "Build complete: $(wc -c < dist/index.html) bytes"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare dist
        run: |
          mkdir -p dist
          cp src/dashboard.html dist/index.html || cp index.html dist/index.html || echo "no html found"
      - uses: actions/configure-pages@v5
        continue-on-error: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "dist/"
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
